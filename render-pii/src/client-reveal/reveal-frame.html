<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; worker-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'">
  <title>Reveal</title>
  <style>
    :root {
      --bg: #111827;
      --panel: rgba(17, 24, 39, 0.96);
      --border: rgba(255, 255, 255, 0.08);
      --canvas: #f8fafc;
      --text: #f3f4f6;
      --muted: rgba(243, 244, 246, 0.55);
      --error: #fca5a5;
      --accent: #f59e0b;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      padding: 12px;
      overflow: hidden;
    }

    body.is-printing,
    body.is-printing * {
      visibility: hidden !important;
    }

    .shell {
      width: 100%;
      height: calc(100vh - 24px);
      min-height: 0;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      align-content: start;
      gap: 12px;
      overflow: hidden;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 18px;
      font-size: 11px;
      color: var(--muted);
    }

    .display-shell {
      padding: 12px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(226, 232, 240, 0.98));
      min-height: 0;
      display: flex;
      align-items: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: 56px;
      border-radius: 12px;
      background: var(--canvas);
      border: 1px solid rgba(15, 23, 42, 0.08);
      pointer-events: none;
    }

    .controls {
      display: none;
    }

    .step-up {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .step-up[hidden] { display: none; }

    input, button {
      font: inherit;
    }

    input {
      width: 100%;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      outline: none;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      background: var(--accent);
      color: #1f2937;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .error {
      margin: 0;
      min-height: 18px;
      color: var(--error);
      font-size: 12px;
      line-height: 1.4;
    }

    @media print {
      html, body {
        background: #fff !important;
      }

      body,
      body * {
        visibility: hidden !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="meta">
      <span id="sessionStatus"></span>
      <span id="stateHint"></span>
    </div>

    <div class="display-shell">
      <canvas id="displayCanvas" width="360" height="56" aria-hidden="true"></canvas>
    </div>

    <div class="controls">
      <button id="toggleButton" type="button" disabled>Show</button>
    </div>

    <form class="step-up" id="stepUpPanel" hidden>
      <input id="credentialInput" name="credential" type="password" autocomplete="current-password" inputmode="text" placeholder="password">
      <button type="submit">Verify</button>
      <p class="error" id="stepUpError" hidden></p>
    </form>
  </main>

  <script type="module" src="./pii-frame.js"></script>
</body>
</html>
